<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konditerem Részletek - Gym Finder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { background-color: #121212; color: white; transition: 0.3s; }
        .card { background-color: #1e1e1e; color: white; border: 1px solid #333; border-radius: 12px; }

        .carousel-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 12px;
        }

        #fav-btn {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #fav-btn:hover { transform: scale(1.1); }
        #fav-btn:active { transform: scale(0.9); }

        .form-control, .form-select {
            background-color: #2c2c2c;
            border: 1px solid #444;
            color: white;
        }

        #reviews-container::-webkit-scrollbar { width: 8px; }
        #reviews-container::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    </style>
</head>
<body class="dark">

<header class="topbar d-flex justify-content-between align-items-center p-3 sticky-top" style="background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); z-index: 1000;">
    <a href="index.html" class="brand-logo text-decoration-none d-flex align-items-center">
        <svg xmlns="http://www.w3.org/2000/svg" width="45" height="45" viewBox="0 0 24 24" fill="#38bdf8">
            <path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/>
        </svg>
        <span class="brand-text text-white ms-2 fw-bold">Gym Finder</span>
    </a>

    <nav class="d-flex align-items-center">
        <a href="index.html" class="nav-link text-white text-decoration-none me-4 fw-bold">Főoldal</a>
        <a href="kapcsolat.html" class="nav-link text-white text-decoration-none me-4 fw-bold">Kapcsolat</a>
        <a href="profil.html" id="profile-link" class="text-info text-decoration-none me-4 fw-bold" style="display:none;">Profil</a>
        <a href="admin.html" id="admin-link" class="text-danger text-decoration-none me-4 fw-bold" style="display:none;">Admin</a>
        <span id="user-info" class="me-2 text-success fw-bold"></span>
        <a href="login.html" id="login-link" class="btn btn-outline-light">Login</a>
        <button onclick="toggleTheme()" class="btn btn-outline-info me-2 ms-3" id="theme-toggle">Sötét/Világos Mód</button>
        <button id="logout-btn" class="btn btn-danger ms-2" style="display:none; padding: 5px 15px;">Kijelentkezés</button>
    </nav>
</header>

<div class="container mt-4 pb-5">
    <div class="row">
        <div class="col-lg-7 mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 id="gym-name" class="text-info fw-bold display-6 mb-0">Terem neve...</h2>
                <button id="fav-btn" class="btn btn-outline-danger rounded-circle shadow p-0">
                    <i id="fav-icon" class="bi bi-heart fs-4 m-0"></i>
                </button>
            </div>

            <div id="gymCarousel" class="carousel slide shadow-lg mb-4" data-bs-ride="carousel">
                <div class="carousel-inner rounded-3" id="carousel-items">
                    <div class="carousel-item active">
                        <img src="https://via.placeholder.com/800x400?text=Betöltés..." class="d-block w-100" alt="Betöltés">
                    </div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#gymCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#gymCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon"></span>
                </button>
            </div>

            <div class="card p-4 mb-4 shadow-sm fs-5">
                <h4 class="mb-3 text-info fw-bold">Információk</h4>
                <p><strong>Nyitvatartás:</strong> <span id="gym-opening">...</span></p>
                <p><strong>Telefon:</strong> <span id="gym-phone">...</span></p>
                <p><strong>Email:</strong> <span id="gym-email">...</span></p>
            </div>

            <div class="card p-4 mb-4 shadow-sm">
                <h4 class="mb-3 text-info fw-bold">Elhelyezkedés</h4>
                <div id="gym-map" style="height: 350px; width: 100%; border-radius: 10px;"></div>
            </div>

            <button id="buy-ticket-btn" class="btn btn-success w-100 fs-4 py-3 fw-bold shadow">Bérlet vásárlása</button>
        </div>

        <div class="col-lg-5">
            <div class="card p-4 shadow-lg sticky-top" style="top: 100px;">
                <h4 class="text-info mb-3 fw-bold">Vélemények</h4>
                <div id="reviews-container" class="mb-4 pe-2" style="max-height: 300px; overflow-y: auto;">
                    <p class="text-muted">Még nincs értékelés.</p>
                </div>
                <hr>
                <h5 class="mb-3 fw-bold">Írj véleményt!</h5>
                <form id="review-form">
                    <select id="review-stars" class="form-select mb-3">
                        <option value="5">⭐⭐⭐⭐⭐ (5)</option>
                        <option value="4">⭐⭐⭐⭐ (4)</option>
                        <option value="3">⭐⭐⭐ (3)</option>
                        <option value="2">⭐⭐ (2)</option>
                        <option value="1">⭐ (1)</option>
                    </select>
                    <textarea id="review-text" class="form-control mb-3" rows="3" placeholder="Véleményed..." required></textarea>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Küldés</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="js/app.js"></script>
</body>
</html>
